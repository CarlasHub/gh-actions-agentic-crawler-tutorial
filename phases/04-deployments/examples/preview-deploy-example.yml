name: Preview Deploy Example

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  build:
    name: Build preview artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-build
          path: dist/

  deploy-preview:
    name: Deploy preview
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: preview
      url: ${{ steps.preview.outputs.preview_url }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: preview-build
          path: dist/

      - name: Publish preview
        id: preview
        run: echo "preview_url=https://preview.example.com/pr-${{ github.event.number }}" >> "$GITHUB_OUTPUT"
