name: Reusable Node CI Example

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: "20"
      run-build:
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  shared-ci:
    name: Shared Node CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build application
        if: ${{ inputs.run-build }}
        run: npm run build
